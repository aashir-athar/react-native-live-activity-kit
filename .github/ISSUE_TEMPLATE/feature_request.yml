name: Feature request
description: Suggest an improvement to react-native-live-activity-kit
labels: ["enhancement"]
body:
  - type: textarea
    attributes:
      label: Problem
      description: What are you trying to do that the library can't do today?
    validations:
      required: true
  - type: textarea
    attributes:
      label: Proposed solution
      description: API sketch or behaviour you'd like (client, /server sender, config plugin, or the SwiftUI template).
  - type: dropdown
    attributes:
      label: Area
      multiple: true
      options:
        - Client module (start/update/end, tokens, listeners)
        - Server sender (/server APNs)
        - Config plugin (widget extension scaffolding)
        - SwiftUI template / ContentState schema
        - Docs
  - type: textarea
    attributes:
      label: Alternatives considered
